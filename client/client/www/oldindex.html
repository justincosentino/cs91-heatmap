<!doctype html>
<html lang="en" ng-app="app">
<head>
  <meta charset="utf-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Flock</title>  
  
  <link rel="stylesheet" href="lib/onsen/css/onsenui.css">  
  <link rel="stylesheet" href="styles/onsen-css-components-blue-basic-theme.css">  
  <link rel="stylesheet" href="styles/app.css"/>

  <script src="lib/onsen/js/angular/angular.js"></script>    
  <script src="lib/onsen/js/onsenui.js"></script>    

  <script src="cordova.js"></script>
  <script src="lib/flock/app.js"></script>

  <style>
    .page--menu-page__background {
      background-color: #333;
    }
    
    .page--menu-page__content {
      color: white;
    }

    .menu-close,
    .menu-close > .toolbar-button {
      color: #999;
    }

    .menu-list,
    .menu-item:first-child,
    .menu-item:last-child,
    .menu-item {
      background-color: transparent;
      background-image: none !important;
      border-color: transparent;
      color: #fff;
    }

    .menu-item {
      padding: 0 0 0 20px;
      line-height: 52px;
      height: 52px;
      text-shadow: rgba(0, 0, 0, 0.4) 0px 1px 0px;
    }

    .menu-item:active {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .menu-notification {
      display: inline-block;
      margin-top: 12px;
      font-size: 14px;
      height: 16px;
      line-height: 16px;
      min-width: 16px;
      font-weight: 600;
    }

    .bottom-menu-list,
    .bottom-menu-item:first-child,
    .bottom-menu-item:last-child,
    .bottom-menu-item {
      border-color: #393939;
      background-color: transparent;
      background-image: none !important;
      color: #ccc;
    }

    .bottom-menu-item:active {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .text-input {
      margin-top: 4px;
    }

    .textarea {
      margin-top: 4px;
    }
  </style>
  
  <!-- TODO: Store state of fuzzing/location data elsewhere -->

  <script>

  </script>

</head>

<body ng-controller="AppController">    
  
  <ons-sliding-menu
    menu-page="menu.html" main-page="mapClusterView.html" side="left"
    var="menu" type="reveal" max-slide-distance="260px" swipable="true">
  </ons-sliding-menu>


  <!-- Sidebar menu -->
  <ons-template id="menu.html">
    <ons-page modifier="menu-page">
      <ons-toolbar modifier="transparent"></ons-toolbar>

      <ons-list class="menu-list">
        <ons-list-item class="menu-item">
          Location Data
          <ons-switch modifier="list-item" var="locationSwitch" checked="true" onchange="locationSwitchChanged()"></ons-switch>
        </ons-list-item>
        <ons-list-item class="menu-item"> 
          Fuzzing
          <ons-switch modifier="list-item" var="fuzzingSwitch" onchange="fuzzingSwitchChanged()"></ons-switch>
        </ons-list-item>
      </ons-list>

      <br>

      <ons-list class="bottom-menu-list">
        <ons-list-item class="bottom-menu-item" onclick="mapView()">
          Map
        </ons-list-item>

        <ons-list-item class="bottom-menu-item" ng-click="menu.setMainPage('about.html', {closeMenu: true})">
          About
        </ons-list-item>

        <ons-list-item class="bottom-menu-item" ng-click="menu.setMainPage('feedback.html', {closeMenu: true})">
          Send Feedback
        </ons-list-item>
      </ons-list>
    </ons-page>
  </ons-template>


  <!-- Cluster View of Google Maps -->
  <ons-template id="mapClusterView.html">
    <ons-page>
      <ons-toolbar>
        <div class="left">
          <ons-toolbar-button ng-click="menu.toggle()">
            <ons-icon icon="ion-navicon" size="28px" fixed-width="false"></ons-icon>
          </ons-toolbar-button>
        </div>
        <div class="center">Flock</div>-
        <div class="right">
          <ons-toolbar-button onclick="alert('You refreshed me!')">
            <ons-icon icon="ion-refresh" size="28px" fixed-width="false" ></ons-icon>
          </ons-toolbar-button>
        </div>
      </ons-toolbar>

      <ons-row style="margin-top: 100px;">
        <ons-col align="center">
          <div style="width:100%;height:100%; z-index: 9999;" id="map_canvas"></div>
          <button id="showbutton" style="z-index: 100000;">Full Screen</button>
        </ons-col>
      </ons-row>
    </ons-page>
  </ons-template>


  <!-- Location Sharing Off -->
  <ons-template id="noLocationServices.html">
    <ons-page>
      <ons-toolbar>
        <div class="left">
          <ons-toolbar-button ng-click="menu.toggle()">
            <ons-icon icon="ion-navicon" size="28px" fixed-width="false"></ons-icon>
          </ons-toolbar-button>
        </div>
        <div class="center">Flock</div>
      </ons-toolbar>

      <ons-row style="margin-top: 100px;">
        <ons-col align="center">
          <ons-button modifier="light" ng-click="menu.toggleMenu()">
            Turn on location services
          </ons-button>
          <p style="color: #999; font-size: 13px; width: 80%; margin: 0 auto;"> In order to view map data, you must first enable Flock to access your own location data. </p>
        </ons-col>
      </ons-row>
    </ons-page>
  </ons-template>

  <!-- Feedback form -->
  <ons-template id="feedback.html">
    <ons-page>
      <ons-toolbar>
        <div class="left">
          <ons-toolbar-button ng-click="menu.toggle()">
            <ons-icon icon="ion-navicon" size="28px" fixed-width="false"></ons-icon>
          </ons-toolbar-button>
        </div>
        <div class="center">Flock</div>
      </ons-toolbar>

      <ons-list>
          <ons-list-item>
            <input class="text-input text-input--transparent" id="feedbackSubject" style="width: 100%" placeholder="Subject">
          </ons-list-item>
          <ons-list-item>
            <textarea class="textarea textarea--transparent" style="width: 100%; height: 100px;" id="feedbackMessage" placeholder="Message"></textarea>
          </ons-list-item>
          <ons-list-item>
            <div style="padding: 10px 9px">
              <ons-button modifier="large" style="margin: 0 auto;">
                Send
              </ons-button>
            </div>
          </ons-list-item>
      </ons-list>
    </ons-page>
  </ons-template>

  <!-- About -->
  <ons-template id="about.html">
    <ons-page>
      <ons-toolbar>
        <div class="left">
          <ons-toolbar-button ng-click="menu.toggle()">
            <ons-icon icon="ion-navicon" size="28px" fixed-width="false"></ons-icon>
          </ons-toolbar-button>
        </div>
        <div class="center">Flock</div>
      </ons-toolbar>

      <ons-row style="margin-top: 100px;">
        <ons-col align="center">
          <p style="color: #999; font-size: 13px;"> About info goes here </p>
        </ons-col>
      </ons-row>
    </ons-page>
  </ons-template>
 
</body>
</html>
